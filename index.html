<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      #start-screen {
        position: fixed; inset: 0; z-index: 9999;
        background: rgba(0,0,0,0.9);
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        color: white; font-family: sans-serif;
      }
      #start-btn {
        padding: 15px 30px; font-size: 18px; background: #28a745;
        color: white; border: none; border-radius: 5px; cursor: pointer;
      }
    </style>
  </head>
  <body>

    <div id="start-screen">
      <p>Hướng camera vào ảnh con lợn để xem video</p>
      <button id="start-btn">Bắt đầu quét</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: yes;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="pigVideo" src="test.mp4" loop="true" crossorigin="anonymous" playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target" mindar-image-target="targetIndex: 0">
        <a-video src="#pigVideo" width="1" height="0.56" position="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const startBtn = document.querySelector('#start-btn');
      const startScreen = document.querySelector('#start-screen');
      const sceneEl = document.querySelector('a-scene');
      const video = document.querySelector('#pigVideo');
      const targetEl = document.querySelector('#target');

      startBtn.addEventListener('click', () => {
        startScreen.style.display = 'none';
        sceneEl.systems["mindar-image-system"].start();
      });

      // Khi quét trúng ảnh con lợn
      targetEl.addEventListener("targetFound", () => {
        video.play();
      });

      // Khi camera không còn nhìn thấy ảnh
      targetEl.addEventListener("targetLost", () => {
        video.pause();
      });
    </script>
  </body>
</html>
